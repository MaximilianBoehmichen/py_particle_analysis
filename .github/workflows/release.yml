name: Release

permissions:
  contents: read

on:
  push:
    tags: ["v*"]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  #v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  #v7.0.0
        with:
          python-version: "3.12"

      - name: Refuse to release a commit that is not on main
        run: |
          git fetch origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at a commit that is not on main."
            exit 1
          fi
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Classify the tag
        id: check
        run: |
          pip install packaging
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import os
          from packaging.version import Version
          v = Version(os.environ["GITHUB_REF_NAME"].lstrip("v"))
          print(f"prerelease={str(v.is_prerelease).lower()}")
          EOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Check event matches version
        run: |
          if [ "$EVENT" = "release" ] && [ "$PRERELEASE" = "true" ]; then
            echo "::error::Prereleases must be tag-pushed, not released."; exit 1
          fi
          if [ "$EVENT" = "push" ] && [ "$PRERELEASE" = "false" ]; then
            echo "::error::Final versions must be published as a GitHub Release."; exit 1
          fi
        env:
          EVENT: ${{ github.event_name }}
          PRERELEASE: ${{ steps.check.outputs.prerelease }}

      - run: pip install build
      - run: python -m build
      - run: pipx run twine check --strict dist/*

      - name: Verify no local version identifier
        run: |
          if ls dist/ | grep -q '+'; then
            echo "::error::Local version identifier present - tag not visible or tree dirty."
            exit 1
          fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  #v7.0.1
        with:
          name: dist
          path: dist/

  test-install:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  #v8.0.1
        with: {name: dist, path: dist/}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  #v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install the built wheel and import it
        shell: bash
        run: |
          pip install dist/*.whl
          python -c "import pypana; print(pypana.__version__)"

  testpypi:
    needs: [build, test-install]
    if: github.event_name == 'push' && needs.build.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  #v8.0.1
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  #v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi:
    needs: [build, test-install]
    if: github.event_name == 'release' && needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  #v8.0.1
        with: {name: dist, path: dist/}
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247  #v1.14.1
      - name: Attach build artifacts to the release
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
